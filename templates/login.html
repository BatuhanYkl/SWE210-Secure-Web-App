{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<style>
  .login-wrap { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .login-box { background: #0c0c0c; border: 1px solid #1f1f1f; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
  .logo-container { text-align: center; margin-bottom: 1.5rem; }
  .login-logo { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 2px solid #3b82f6; display: block; margin: 0 auto; }
  .login-title { text-align: center; font-size: 1.35rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
  .login-sub { text-align: center; color: #a3a3a3; font-size: 0.85rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 0.5px; }
  label { display: block; font-size: 0.75rem; font-weight: 600; color: #d4d4d4; text-transform: uppercase; margin-bottom: 0.4rem; margin-top: 1.2rem; }
  input[type=text], input[type=password] { width: 100%; padding: 0.75rem 1rem; background: #050505; border: 1px solid #1f1f1f; border-radius: 8px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.2s; }
  input:focus { border-color: #3b82f6; background: #0a0a0a; }
  .btn-login { width: 100%; padding: 0.8rem; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 1.75rem; transition: background 0.2s; }
  .btn-login:hover { background: #1d4ed8; }
  .register-link { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: #a3a3a3; }
</style>

<div class="login-wrap">
  <div class="login-box">
    <div class="logo-container">
      <img src="{{ url_for('static', filename='images/vibzztime.jpg') }}" alt="Vibzztime Meme" class="login-logo"/>
    </div>
    <div class="login-title">ISU Portal Authentication</div>
    <div class="login-sub">Academic Cryptographic Ledger</div>

    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus autocomplete="off"/>
      
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required/>
      
      <button type="submit" class="btn-login">Verify Identity</button>
    </form>

    <div class="register-link">Student registration portal: <a href="{{ url_for('register') }}">Initialize Account</a></div>
  </div>
</div>
{% endblock %}
